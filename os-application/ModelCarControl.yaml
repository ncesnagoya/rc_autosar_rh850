Ecuc:
  Os:
    OsInclude:
      OsIncludeFileName: ModelCarControl.h
    AppMode_ALL:
      DefinitionRef: OsAppMode
    AppMode_Body:
      DefinitionRef: OsAppMode
    AppMode_Cont:
      DefinitionRef: OsAppMode
    AppMode_Ope:
      DefinitionRef: OsAppMode
    AppMode_Body_Cont:
      DefinitionRef: OsAppMode
    AppMode_Body_Ope:
      DefinitionRef: OsAppMode
    AppMode_Cont_Ope:
      DefinitionRef: OsAppMode
    OsOS:
      OsStackMonitoring: true
      OsUseGetServiceId: true
      OsUseParameterAccess: true
      OsScalabilityClass: SC1
      OsStatus: EXTENDED
      OsHooks:
        OsErrorHook: true
        OsPostTaskHook: false
        OsPreTaskHook: false
        OsProtectionHook: true
        OsShutdownHook: true
        OsStartupHook: true
      OsHookStack:
        OsHookStackSize: 0x200

    OperationManagerTask:
      DefinitionRef: OsTask
      OsTaskActivation: 1U
      OsTaskPriority: 2
      OsTaskStackSize: 0x800
      OsTaskSchedule: FULL
    OperationManagerCycAlarm:
      DefinitionRef: OsAlarm
      OsAlarmCounterRef: /Ecuc/Os/MAIN_HW_COUNTER
      OsAlarmAction:
        OsAlarmActivateTask:
          OsAlarmActivateTaskRef: /Ecu_CBO/Os/OperationManagerTask
      OsAlarmAutostart:
        OsAlarmAlarmTime: TICK_FOR_10MS
        OsAlarmCycleTime: TICK_FOR_10MS
        OsAlarmAutostartType: ABSOLUTE
        OsAlarmAppModeRef:
          - /Ecuc/Os/AppMode_ALL
          - /Ecuc/Os/AppMode_Ope
          - /Ecuc/Os/AppMode_Body_Ope
          - /Ecuc/Os/AppMode_Cont_Ope

    BodyControlTask:
      DefinitionRef: OsTask
      OsTaskActivation: 1U
      OsTaskPriority: 2
      OsTaskStackSize: 0x800
      OsTaskSchedule: FULL
    BodyControlCycAlarm:
      DefinitionRef: OsAlarm
      OsAlarmCounterRef: /Ecuc/Os/MAIN_HW_COUNTER
      OsAlarmAction:
        OsAlarmActivateTask:
          OsAlarmActivateTaskRef: /Ecu_CBO/Os/BodyControlTask
      OsAlarmAutostart:
        OsAlarmAlarmTime: TICK_FOR_10MS*10
        OsAlarmCycleTime: TICK_FOR_10MS*10
        OsAlarmAutostartType: ABSOLUTE
        OsAlarmAppModeRef:
          - /Ecuc/Os/AppMode_ALL
          - /Ecuc/Os/AppMode_Body
          - /Ecuc/Os/AppMode_Body_Cont
          - /Ecuc/Os/AppMode_Body_Ope

    BuzzerControlCycAlarm:
      DefinitionRef: OsAlarm
      OsAlarmCounterRef: /Ecuc/Os/MAIN_HW_COUNTER
      OsAlarmAction:
        OsAlarmCallback:
          OsAlarmCallbackName: BuzzerControlCycAlarmCb
      OsAlarmAutostart:
        OsAlarmAlarmTime: TICK_FOR_10MS/80
        OsAlarmCycleTime: TICK_FOR_10MS/80
        OsAlarmAutostartType: ABSOLUTE
        OsAlarmAppModeRef:
          - /Ecuc/Os/AppMode_ALL
          - /Ecuc/Os/AppMode_Body
          - /Ecuc/Os/AppMode_Body_Cont
          - /Ecuc/Os/AppMode_Body_Ope

    DriveManagerTask:
      DefinitionRef: OsTask
      OsTaskActivation: 1U
      OsTaskPriority: 3
      OsTaskStackSize: 0x800
      OsTaskSchedule: FULL
    DriveManagerCycAlarm:
      DefinitionRef: OsAlarm
      OsAlarmCounterRef: /Ecuc/Os/MAIN_HW_COUNTER
      OsAlarmAction:
        OsAlarmActivateTask:
          OsAlarmActivateTaskRef: /Ecu_CBO/Os/DriveManagerTask
      OsAlarmAutostart:
        OsAlarmAlarmTime: TICK_FOR_10MS*2
        OsAlarmCycleTime: TICK_FOR_10MS*2
        OsAlarmAutostartType: ABSOLUTE
        OsAlarmAppModeRef:
          - /Ecuc/Os/AppMode_ALL
          - /Ecuc/Os/AppMode_Cont
          - /Ecuc/Os/AppMode_Body_Cont
          - /Ecuc/Os/AppMode_Cont_Ope

    PowerTrainTask:
      DefinitionRef: OsTask
      OsTaskActivation: 1U
      OsTaskPriority: 14
      OsTaskStackSize: 0x800
      OsTaskSchedule: NON
    PowerTrainCycAlarm:
      DefinitionRef: OsAlarm
      OsAlarmCounterRef: /Ecuc/Os/MAIN_HW_COUNTER
      OsAlarmAction:
        OsAlarmActivateTask:
          OsAlarmActivateTaskRef: /Ecu_CBO/Os/PowerTrainTask
      OsAlarmAutostart:
        OsAlarmAlarmTime: TICK_FOR_10MS
        OsAlarmCycleTime: TICK_FOR_10MS
        OsAlarmAutostartType: ABSOLUTE
        OsAlarmAppModeRef:
          - /Ecuc/Os/AppMode_ALL
          - /Ecuc/Os/AppMode_Cont
          - /Ecuc/Os/AppMode_Body_Cont
          - /Ecuc/Os/AppMode_Cont_Ope

    LedBlinkerCycAlarm:
      DefinitionRef: OsAlarm
      OsAlarmCounterRef: /Ecuc/Os/MAIN_HW_COUNTER
      OsAlarmAction:
        OsAlarmCallback:
          OsAlarmCallbackName: LedBlinkerCycAlarmCb
      OsAlarmAutostart:
        OsAlarmAlarmTime: TICK_FOR_10MS * 50
        OsAlarmCycleTime: TICK_FOR_10MS * 50
        OsAlarmAutostartType: ABSOLUTE
        OsAlarmAppModeRef:
          - /Ecuc/Os/AppMode_ALL
          - /Ecuc/Os/AppMode_Body
          - /Ecuc/Os/AppMode_Cont
          - /Ecuc/Os/AppMode_Ope
          - /Ecuc/Os/AppMode_Body_Cont
          - /Ecuc/Os/AppMode_Body_Ope
          - /Ecuc/Os/AppMode_Cont_Ope
